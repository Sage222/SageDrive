[global]
   workgroup = WORKGROUP
   server string = SageDrive SMB Proxy
   security = user
   map to guest = Never
   log file = /var/log/samba/%m.log
   max log size = 50
   oplocks = no
   kernel oplocks = no
   strict allocate = yes
   # Required for Windows 11 compatibility
   ntlm auth = yes
   server min protocol = NT1

[GoogleDrive]
   path = /mnt/gdrive
   valid users = @sambausers
   writable = yes
   browseable = yes
   create mask = 0775
   directory mask = 0775
