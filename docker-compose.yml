services:
  sagedrive:
    build: ./backend
    container_name: sagedrive
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "445:445"   # SMB Port
    volumes:
      - ./data:/app/data
      - ./frontend/public:/app/frontend/public
    # CRITICAL: These privileges are required for Rclone to mount FUSE filesystems inside Docker
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
