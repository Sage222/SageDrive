version: "3.9"
services:
  sagedrive:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sagedrive
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "445:445"
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
    volumes:
      - sagedrive-data:/app/data
      - ./frontend/public/index.html:/app/static/index.html
    # CRITICAL: These privileges are required for FUSE to work
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined

volumes:
  sagedrive-data:
