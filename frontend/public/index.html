<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SageDrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
      --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
      --color-divider:#dcd9d5;--color-border:#d4d1ca;
      --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
      --color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;
      --color-error:#a12c7b;--color-success:#437a22;
      --color-warning:#964219;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
      --radius-full:9999px;
      --shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06);
      --shadow-md:0 4px 12px oklch(0.2 0.01 80/.08);
      --shadow-lg:0 12px 32px oklch(0.2 0.01 80/.12);
      --font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
      --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
      --space-12:3rem;--space-16:4rem;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --transition-interactive:180ms cubic-bezier(.16,1,.3,1);
      --sidebar-width:240px;
    }
    [data-theme="dark"]{
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
      --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
      --color-divider:#262523;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-primary:#4f98a3;--color-primary-hover:#227f8b;
      --color-primary-highlight:#313b3b;
      --color-error:#d163a7;--color-success:#6daa45;--color-warning:#bb653b;
      --shadow-sm:0 1px 2px oklch(0 0 0/.2);
      --shadow-md:0 4px 12px oklch(0 0 0/.3);
      --shadow-lg:0 12px 32px oklch(0 0 0/.4);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
         color:var(--color-text);background:var(--color-bg);display:flex;flex-direction:column}
    img,svg{display:block;max-width:100%}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
    input,select{font:inherit;color:inherit}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
    a,button,[role="button"]{transition:color var(--transition-interactive),
      background var(--transition-interactive),border-color var(--transition-interactive),
      box-shadow var(--transition-interactive)}

    /* Layout */
    #app{display:flex;flex:1;height:100dvh;overflow:hidden}
    #login-screen{display:flex;align-items:center;justify-content:center;
                  min-height:100dvh;background:var(--color-bg)}

    /* Sidebar */
    .sidebar{width:var(--sidebar-width);background:var(--color-surface);
             border-right:1px solid var(--color-border);display:flex;
             flex-direction:column;flex-shrink:0;height:100%;overflow-y:auto}
    .sidebar-header{padding:var(--space-5) var(--space-4);
                    border-bottom:1px solid var(--color-divider);display:flex;
                    align-items:center;gap:var(--space-3)}
    .sidebar-header-link{display:flex;align-items:center;gap:var(--space-3);text-decoration:none;color:inherit}
    .sidebar-logo{width:28px;height:28px;color:var(--color-primary)}
    .sidebar-title{font-weight:600;font-size:var(--text-base);letter-spacing:-.01em}
    .sidebar-section{padding:var(--space-4) var(--space-3) var(--space-2);
                     font-size:var(--text-xs);text-transform:uppercase;
                     letter-spacing:.08em;color:var(--color-text-faint);font-weight:500}
    .sidebar-item{display:flex;align-items:center;gap:var(--space-3);
                  padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);
                  margin:0 var(--space-2);font-size:var(--text-sm);
                  color:var(--color-text-muted);cursor:pointer;
                  transition:background var(--transition-interactive),
                    color var(--transition-interactive)}
    .sidebar-item:hover{background:var(--color-surface-offset);color:var(--color-text)}
    .sidebar-item.active{background:var(--color-primary-highlight);
                         color:var(--color-primary);font-weight:500}
    .sidebar-item svg{flex-shrink:0;width:16px;height:16px}
    .sidebar-footer{margin-top:auto;padding:var(--space-4);
                    border-top:1px solid var(--color-divider)}

    /* Main content */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;
            padding:0 var(--space-6);height:56px;border-bottom:1px solid var(--color-border);
            background:var(--color-surface);flex-shrink:0}
    .topbar-left{display:flex;align-items:center;gap:var(--space-3)}
    .topbar-right{display:flex;align-items:center;gap:var(--space-2)}
    .breadcrumb{display:flex;align-items:center;gap:var(--space-2);
                font-size:var(--text-sm);color:var(--color-text-muted)}
    .bc-seg{cursor:pointer;color:var(--color-primary)}
    .bc-seg.current{color:var(--color-text);cursor:default}
    .bc-sep{color:var(--color-text-faint)}
    .content-area{flex:1;overflow-y:auto;padding:var(--space-6)}

    /* Components */
    .btn{display:inline-flex;align-items:center;gap:var(--space-2);
         padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);
         font-size:var(--text-sm);font-weight:500;cursor:pointer;
         border:1px solid transparent;transition:all var(--transition-interactive)}
    .btn svg{width:14px;height:14px}
    .btn-primary{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
    .btn-primary:hover{background:var(--color-primary-hover);border-color:var(--color-primary-hover)}
    .btn-secondary{background:var(--color-surface-offset);color:var(--color-text);
                   border-color:var(--color-border)}
    .btn-secondary:hover{background:var(--color-surface-dynamic)}
    .btn-danger{background:transparent;color:var(--color-error);border-color:var(--color-error)}
    .btn-danger:hover{background:var(--color-error);color:#fff}
    .btn-ghost{background:transparent;color:var(--color-text-muted)}
    .btn-ghost:hover{background:var(--color-surface-offset);color:var(--color-text)}
    .btn-sm{padding:var(--space-1) var(--space-3);font-size:var(--text-xs)}
    .btn-icon{padding:var(--space-2);border-radius:var(--radius-md);
              display:flex;align-items:center;justify-content:center}

    .card{background:var(--color-surface);border:1px solid var(--color-border);
          border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
    .card-header{padding:var(--space-4) var(--space-5);
                 border-bottom:1px solid var(--color-divider);
                 display:flex;align-items:center;justify-content:space-between}
    .card-title{font-weight:600;font-size:var(--text-base)}
    .card-body{padding:var(--space-5)}

    .form-group{display:flex;flex-direction:column;gap:var(--space-2)}
    .form-label{font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted)}
    .form-input{padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);
                border:1px solid var(--color-border);background:var(--color-surface-2);
                font-size:var(--text-sm);width:100%;color:var(--color-text);
                transition:border-color var(--transition-interactive),
                  box-shadow var(--transition-interactive)}
    .form-input:focus{border-color:var(--color-primary);
                      box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/.15);outline:none}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}

    /* File browser */
    .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--space-3)}
    .file-list{display:flex;flex-direction:column;gap:0}
    .file-item-grid{background:var(--color-surface);border:1px solid var(--color-border);
                    border-radius:var(--radius-lg);padding:var(--space-4);
                    cursor:pointer;display:flex;flex-direction:column;align-items:center;
                    gap:var(--space-2);text-align:center;
                    transition:all var(--transition-interactive)}
    .file-item-grid:hover{background:var(--color-surface-offset);
                          box-shadow:var(--shadow-md);transform:translateY(-1px)}
    .file-item-list{display:flex;align-items:center;gap:var(--space-3);
                    padding:var(--space-3) var(--space-4);
                    border-bottom:1px solid var(--color-divider);cursor:pointer;
                    transition:background var(--transition-interactive)}
    .file-item-list:hover{background:var(--color-surface-offset)}
    .file-item-list:last-child{border-bottom:none}
    .file-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
               border-radius:var(--radius-md);background:var(--color-surface-offset)}
    .file-icon-grid{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
                    border-radius:var(--radius-lg);background:var(--color-surface-offset)}
    .file-name{font-size:var(--text-sm);font-weight:500;
               overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
    .file-meta{font-size:var(--text-xs);color:var(--color-text-muted)}
    .file-actions{display:flex;gap:var(--space-1);margin-left:auto;opacity:0;
                  transition:opacity var(--transition-interactive)}
    .file-item-list:hover .file-actions{opacity:1}

    .toolbar{display:flex;align-items:center;gap:var(--space-3);
             margin-bottom:var(--space-5);flex-wrap:wrap}
    .view-toggle{display:flex;background:var(--color-surface-offset);
                 border-radius:var(--radius-md);padding:2px;gap:2px}
    .view-btn{padding:var(--space-1) var(--space-2);border-radius:calc(var(--radius-md) - 2px);
              color:var(--color-text-muted);transition:all var(--transition-interactive)}
    .view-btn.active{background:var(--color-surface);color:var(--color-text);
                     box-shadow:var(--shadow-sm)}

    .badge{display:inline-flex;align-items:center;gap:var(--space-1);
           padding:2px var(--space-2);border-radius:var(--radius-full);
           font-size:var(--text-xs);font-weight:500}
    .badge-primary{background:var(--color-primary-highlight);color:var(--color-primary)}
    .badge-success{background:oklch(from var(--color-success) l c h/.15);color:var(--color-success)}
    .badge-error{background:oklch(from var(--color-error) l c h/.15);color:var(--color-error)}

    .modal-backdrop{position:fixed;inset:0;background:oklch(0 0 0/.5);
                    backdrop-filter:blur(4px);z-index:100;display:flex;
                    align-items:center;justify-content:center;padding:var(--space-4)}
    .modal{background:var(--color-surface);border:1px solid var(--color-border);
           border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);
           width:100%;max-width:480px;animation:modal-in .2s ease}
    @keyframes modal-in{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
    .modal-header{padding:var(--space-5) var(--space-6);
                  border-bottom:1px solid var(--color-divider);
                  display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-weight:600;font-size:var(--text-base)}
    .modal-body{padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-4)}
    .modal-footer{padding:var(--space-4) var(--space-6);
                  border-top:1px solid var(--color-divider);
                  display:flex;justify-content:flex-end;gap:var(--space-3)}

    .dropzone{border:2px dashed var(--color-border);border-radius:var(--radius-lg);
              padding:var(--space-10);text-align:center;
              transition:all var(--transition-interactive);color:var(--color-text-muted)}
    .dropzone.drag-over{border-color:var(--color-primary);
                        background:var(--color-primary-highlight);color:var(--color-primary)}

    .toast-container{position:fixed;bottom:var(--space-6);right:var(--space-6);
                     display:flex;flex-direction:column;gap:var(--space-2);z-index:200}
    .toast{background:var(--color-surface-2);border:1px solid var(--color-border);
           border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);
           box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:var(--space-3);
           font-size:var(--text-sm);min-width:260px;max-width:380px;
           animation:toast-in .3s ease}
    @keyframes toast-in{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
    .toast.success{border-color:var(--color-success)}
    .toast.error{border-color:var(--color-error)}
    .toast-icon{flex-shrink:0;width:16px;height:16px}
    .toast.success .toast-icon{color:var(--color-success)}
    .toast.error .toast-icon{color:var(--color-error)}

    .login-card{background:var(--color-surface);border:1px solid var(--color-border);
                border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);
                width:100%;max-width:380px;padding:var(--space-10)}
    .login-logo{display:flex;align-items:center;gap:var(--space-3);
                margin-bottom:var(--space-8)}
    .login-title{font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em}

    .settings-grid{display:grid;gap:var(--space-6)}
    .share-list{display:flex;flex-direction:column;gap:var(--space-3)}
    .share-item{background:var(--color-surface);border:1px solid var(--color-border);
                border-radius:var(--radius-lg);padding:var(--space-4);
                display:flex;align-items:center;gap:var(--space-4)}
    .share-info{flex:1}
    .share-host{font-size:var(--text-xs);color:var(--color-text-muted);
                font-family:var(--font-mono)}

    .spinner{width:20px;height:20px;border:2px solid var(--color-border);
             border-top-color:var(--color-primary);border-radius:50%;
             animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-state{display:flex;align-items:center;justify-content:center;
                   padding:var(--space-16);color:var(--color-text-muted)}

    .empty-state{display:flex;flex-direction:column;align-items:center;
                 text-align:center;padding:var(--space-16) var(--space-8);
                 color:var(--color-text-muted)}
    .empty-state svg{width:48px;height:48px;margin-bottom:var(--space-4);
                     color:var(--color-text-faint)}
    .empty-state h3{color:var(--color-text);margin-bottom:var(--space-2)}
    .empty-state p{max-width:36ch;margin-bottom:var(--space-6)}

    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;
               transform:translateX(-100%);transition:transform var(--transition-interactive)}
      .sidebar.open{transform:none}
      .main{width:100%}
      .form-row{grid-template-columns:1fr}
      .file-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg class="sidebar-logo" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="currentColor" opacity=".12"/>
        <path d="M6 20L11 8l3 7 3-5 5 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="22" cy="8" r="2" fill="currentColor"/>
      </svg>
      <span class="login-title">SageDrive</span>
    </div>
    <form id="login-form" style="display:flex;flex-direction:column;gap:var(--space-4)">
      <div class="form-group">
        <label class="form-label" for="login-user">Username</label>
        <input class="form-input" id="login-user" type="text" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-pass">Password</label>
        <input class="form-input" id="login-pass" type="password" required />
      </div>
      <div id="login-error" style="color:var(--color-error);font-size:var(--text-sm);display:none"></div>
      <button class="btn btn-primary" type="submit" id="login-btn" style="margin-top:var(--space-2)">Sign in</button>
    </form>
  </div>
</div>

<div id="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a class="sidebar-header-link" href="https://github.com/Sage222/SageDrive" target="_blank" rel="noopener noreferrer" title="Open SageDrive on GitHub">
        <svg class="sidebar-logo" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="currentColor" opacity=".12"/>
          <path d="M6 20L11 8l3 7 3-5 5 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22" cy="8" r="2" fill="currentColor"/>
        </svg>
        <span class="sidebar-title">SageDrive</span>
      </a>
    </div>

    <div style="flex:1;padding:var(--space-3) 0">
      <div class="sidebar-section">Drives</div>
      <div id="sidebar-drives"></div>
      <div class="sidebar-section" style="margin-top:var(--space-4)">App</div>
      <div class="sidebar-item" data-view="settings" onclick="setView('settings')">
        <svg data-lucide="settings"></svg> Settings
      </div>
    </div>

    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span id="sidebar-user" style="font-size:var(--text-sm);color:var(--color-text-muted)"></span>
        <div style="display:flex;gap:var(--space-1)">
          <button class="btn-ghost btn-icon btn" onclick="toggleTheme()" aria-label="Toggle theme">
            <svg data-lucide="sun"></svg>
          </button>
          <button class="btn-ghost btn-icon btn" onclick="doLogout()" aria-label="Sign out">
            <svg data-lucide="log-out"></svg>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn btn-ghost btn-icon" id="mobile-menu-btn" style="display:none"
                onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg data-lucide="menu"></svg>
        </button>
        <nav class="breadcrumb" id="breadcrumb"></nav>
      </div>
      <div class="topbar-right" id="topbar-actions"></div>
    </div>
    <div class="content-area" id="content-area"></div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<div id="modal-root"></div>

<script>
const API = '';
let _token = sessionStorage.getItem('sd_token') || null;
let _user  = null;
let _view  = 'welcome';
let _activeDrive = null;
let _path  = '/';
let _folderId = 'root';
let _pathStack = [];
let BREADCRUMBS = [];
let _viewMode  = 'list';
let _shares    = [];
let _gdStatus  = {configured:false, authenticated:false};
let _gdConfig  = {client_id:'', client_secret:'', redirect_uri:''};

async function apiFetch(path, opts={}) {
  const headers = { ...(opts.headers||{}) };
  if (_token) headers['Authorization'] = `Bearer ${_token}`;
  if (opts.json) {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.json);
    delete opts.json;
  }
  const r = await fetch(API + path, {...opts, headers});
  if (r.status === 401) { doLogout(); throw new Error('Unauthorised'); }
  return r;
}

async function apiJSON(path, opts={}) {
  const r = await apiFetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(()=>({error:'Request failed'}));
    throw new Error(err.error || 'Request failed');
  }
  return r.json();
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const data = await apiJSON('/api/auth/login', {
      method:'POST',
      json:{
        username: document.getElementById('login-user').value,
        password: document.getElementById('login-pass').value,
      }
    });
    _token = data.token;
    sessionStorage.setItem('sd_token', _token);
    await initApp();
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});

async function doLogout() {
  try { await apiFetch('/api/auth/logout', {method:'POST'}); } catch(_){}
  _token = null;
  sessionStorage.removeItem('sd_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function initApp() {
  try {
    _user = await apiJSON('/api/auth/me');
  } catch(_) { doLogout(); return; }

  document.getElementById('sidebar-user').textContent = _user.username;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  await refreshShares();
  await refreshGDStatus();
  renderSidebar();
  setView('welcome');
  lucide.createIcons();
}

function renderSidebar() {
  const el = document.getElementById('sidebar-drives');
  let html = '';

  const gdConnected = _gdStatus.authenticated;
  html += `<div class="sidebar-item ${_activeDrive?.type==='gdrive'?'active':''}"
              onclick="openGDrive()">
    <svg data-lucide="${gdConnected?'hard-drive':'cloud-off'}"></svg>
    Google Drive
    ${gdConnected?'':`<span class="badge badge-error" style="margin-left:auto;font-size:10px">off</span>`}
  </div>`;

  for (const s of _shares) {
    html += `<div class="sidebar-item ${_activeDrive?.id===s.id&&_activeDrive.type==='smb'?'active':''}"
                onclick="openShare('${s.id}','${escHtml(s.name)}')">
      <svg data-lucide="server"></svg>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(s.name)}</span>
    </div>`;
  }

  if (!_shares.length && !_gdStatus.configured) {
    html += `<div style="padding:var(--space-3);font-size:var(--text-xs);color:var(--color-text-faint)">
      No drives — add one in Settings
    </div>`;
  }

  el.innerHTML = html;
  lucide.createIcons();
}

function setView(v) {
  _view = v;
  document.querySelectorAll('.sidebar-item[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === v);
  });
  if (v === 'welcome') renderWelcome();
  if (v === 'settings') renderSettings();
}

function renderWelcome() {
  setBreadcrumb([{name:'Home'}]);
  setTopbarActions('');
  document.getElementById('content-area').innerHTML = `
    <div class="empty-state" style="margin-top:var(--space-12)">
      <svg data-lucide="layers" width="64" height="64" style="color:var(--color-primary)"></svg>
      <h2 style="font-size:var(--text-xl);margin-bottom:var(--space-3)">Welcome to SageDrive</h2>
      <p style="color:var(--color-text-muted);max-width:44ch">
        Select a drive from the sidebar to browse files, or head to
        <strong>Settings</strong> to add an SMB share or connect Google Drive.
      </p>
    </div>`;
  lucide.createIcons();
}

function openShare(id, name) {
  _activeDrive = {type:'smb', id, name};
  _path = '/';
  renderSidebar();
  loadSMBFiles();
}

async function loadSMBFiles() {
  setBreadcrumb(smbBreadcrumbs());
  setTopbarActions(fileToolbar('smb'));
  showLoading();
  try {
    const files = await apiJSON(`/api/smb/browse/${_activeDrive.id}?path=${encodeURIComponent(_path)}`);
    renderFileView(files, 'smb');
  } catch(e) { showError(e.message); }
}

function smbBreadcrumbs() {
  const parts = _path.split('/').filter(Boolean);
  const crumbs = [{name: _activeDrive.name, target: '/'}];
  let built = '';
  for (let i = 0; i < parts.length; i++) {
    built += '/' + parts[i];
    crumbs.push({name: parts[i], target: built});
  }
  return crumbs;
}

function openGDrive() {
  if (!_gdStatus.authenticated) {
    toast('Connect Google Drive in Settings first', 'error'); return;
  }
  _activeDrive = {type:'gdrive', id:'root', name:'Google Drive'};
  _folderId = 'root';
  _pathStack = [{id:'root', name:'Google Drive'}];
  renderSidebar();
  loadGDriveFiles();
}

async function loadGDriveFiles() {
  setBreadcrumb(gDriveBreadcrumbs());
  setTopbarActions(fileToolbar('gdrive'));
  showLoading();
  try {
    const files = await apiJSON(`/api/gdrive/files?folder=${_folderId}`);
    renderFileView(files, 'gdrive');
  } catch(e) { showError(e.message); }
}

function gDriveBreadcrumbs() {
  return _pathStack.map((seg, i) => ({
    name: seg.name,
    index: i
  }));
}

function renderFileView(files, type) {
  if (!files.length) {
    document.getElementById('content-area').innerHTML = `
      <div class="empty-state">
        <svg data-lucide="folder-open" width="48" height="48"></svg>
        <h3>Empty folder</h3>
        <p>Upload a file or create a new folder to get started.</p>
      </div>`;
    lucide.createIcons(); return;
  }

  files.sort((a,b) => {
    if (a.type===b.type) return a.name.localeCompare(b.name);
    return a.type==='folder' ? -1 : 1;
  });

  const ca = document.getElementById('content-area');
  if (_viewMode === 'grid') {
    ca.innerHTML = `<div class="file-grid">${files.map(f=>fileCardGrid(f,type)).join('')}</div>`;
  } else {
    ca.innerHTML = `<div class="card"><div class="file-list">${files.map(f=>fileCardList(f,type)).join('')}</div></div>`;
  }
  lucide.createIcons();
}

function fileIcon(f) {
  if (f.type==='folder') return 'folder';
  const ext = f.name.split('.').pop().toLowerCase();
  const map = {
    pdf:'file-text',mp3:'music',mp4:'video',mov:'video',avi:'video',
    jpg:'image',jpeg:'image',png:'image',gif:'image',webp:'image',svg:'image',
    zip:'archive',tar:'archive',gz:'archive','7z':'archive',rar:'archive',
    doc:'file-text',docx:'file-text',xls:'file-spreadsheet',xlsx:'file-spreadsheet',
    ppt:'presentation',pptx:'presentation',txt:'file-text',md:'file-text',
    js:'code',ts:'code',py:'code',sh:'code',json:'code',html:'code',css:'code',
  };
  return map[ext] || 'file';
}

function fileColorClass(f) {
  if (f.type==='folder') return 'color:var(--color-gold,#d19900)';
  const ext = f.name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return 'color:var(--color-blue)';
  if (['mp3','wav','flac'].includes(ext)) return 'color:var(--color-purple)';
  if (['mp4','mov','avi','mkv'].includes(ext)) return 'color:var(--color-error)';
  if (['zip','tar','gz','rar'].includes(ext)) return 'color:var(--color-warning)';
  if (['pdf'].includes(ext)) return 'color:var(--color-notification,#a13544)';
  return 'color:var(--color-text-muted)';
}

function fmtSize(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return bytes+'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1)+'KB';
  if (bytes < 1073741824) return (bytes/1048576).toFixed(1)+'MB';
  return (bytes/1073741824).toFixed(2)+'GB';
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = typeof ts==='number' ? new Date(ts*1000) : new Date(ts);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
}

function fileCardGrid(f, type) {
  const fj = escAttr(JSON.stringify(f));
  return `<div class="file-item-grid" onclick="fileClick('${fj}','${type}')">
    <div class="file-icon-grid" style="${fileColorClass(f)}">
      <svg data-lucide="${fileIcon(f)}" width="24" height="24"></svg>
    </div>
    <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
    <span class="file-meta">${fmtSize(f.size)}</span>
  </div>`;
}

function fileCardList(f, type) {
  const fj = escAttr(JSON.stringify(f));
  return `<div class="file-item-list">
    <div class="file-icon" style="${fileColorClass(f)}">
      <svg data-lucide="${fileIcon(f)}" width="18" height="18"></svg>
    </div>
    <span class="file-name" style="max-width:none;flex:1" title="${escHtml(f.name)}"
          onclick="fileClick('${fj}','${type}')">${escHtml(f.name)}</span>
    <span class="file-meta" style="min-width:80px;text-align:right">${fmtSize(f.size)}</span>
    <span class="file-meta" style="min-width:100px;text-align:right">${fmtDate(f.modified)}</span>
    <div class="file-actions">
      ${f.type!=='folder'?`<button class="btn btn-ghost btn-icon btn-sm" onclick="dlFile('${fj}','${type}')" title="Download">
        <svg data-lucide="download" width="14" height="14"></svg></button>`:''}
      <button class="btn btn-danger btn-icon btn-sm" onclick="rmFile('${fj}','${type}')" title="Delete">
        <svg data-lucide="trash-2" width="14" height="14"></svg></button>
    </div>
  </div>`;
}

function fileClick(fJson, type) {
  const f = JSON.parse(fJson);
  if (f.type !== 'folder') { dlFile(fJson, type); return; }
  if (type==='smb') {
    _path = f.path || (_path.replace(/\/$/,'') + '/' + f.name);
    loadSMBFiles();
  } else {
    _pathStack.push({id:f.id, name:f.name});
    _folderId = f.id;
    loadGDriveFiles();
  }
}

function dlFile(fJson, type) {
  const f = JSON.parse(fJson);
  if (type==='smb') {
    authedDownload(`/api/smb/download/${_activeDrive.id}?path=${encodeURIComponent(f.path)}`, f.name);
  } else {
    authedDownload(`/api/gdrive/download/${f.id}`, f.name);
  }
}

async function authedDownload(path, name) {
  try {
    const r = await apiFetch(path);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
  } catch(e) { toast('Download failed: '+e.message, 'error'); }
}

async function rmFile(fJson, type) {
  const f = JSON.parse(fJson);
  if (!confirm(`Delete "${f.name}"?`)) return;
  try {
    if (type==='smb') {
      await apiJSON(`/api/smb/delete/${_activeDrive.id}`, {
        method:'DELETE', json:{path:f.path||f.name, is_dir:f.type==='folder'}
      });
      loadSMBFiles();
    } else {
      await apiJSON(`/api/gdrive/delete/${f.id}`, {method:'DELETE'});
      loadGDriveFiles();
    }
    toast(`Deleted "${f.name}"`, 'success');
  } catch(e) { toast('Delete failed: '+e.message, 'error'); }
}

function fileToolbar(type) {
  return `
    <button class="btn btn-secondary btn-sm" onclick="showMkdirModal('${type}')">
      <svg data-lucide="folder-plus" width="14" height="14"></svg> New Folder
    </button>
    <button class="btn btn-primary btn-sm" onclick="showUploadModal('${type}')">
      <svg data-lucide="upload" width="14" height="14"></svg> Upload
    </button>
    <div class="view-toggle">
      <button class="view-btn ${_viewMode==='list'?'active':''}" onclick="setViewMode('list')" title="List view">
        <svg data-lucide="list" width="16" height="16"></svg>
      </button>
      <button class="view-btn ${_viewMode==='grid'?'active':''}" onclick="setViewMode('grid')" title="Grid view">
        <svg data-lucide="grid-3x3" width="16" height="16"></svg>
      </button>
    </div>`;
}

function setViewMode(m) {
  _viewMode = m;
  if (_activeDrive?.type==='smb') loadSMBFiles();
  else if (_activeDrive?.type==='gdrive') loadGDriveFiles();
}

function showUploadModal(type) {
  showModal(`
    <div class="modal-header">
      <span class="modal-title">Upload Files</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg data-lucide="x" width="16" height="16"></svg></button>
    </div>
    <div class="modal-body">
      <div class="dropzone" id="dropzone" ondragover="dzOver(event)" ondragleave="dzLeave(event)" ondrop="dzDrop(event,'${type}')">
        <svg data-lucide="upload-cloud" width="32" height="32" style="margin:0 auto var(--space-3);color:var(--color-text-faint)"></svg>
        <p style="margin-bottom:var(--space-3)">Drag & drop files here</p>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('file-input').click()">
          Choose files
        </button>
        <input type="file" id="file-input" style="display:none" multiple onchange="uploadFiles(this.files,'${type}')">
      </div>
      <div id="upload-progress" style="display:none;font-size:var(--text-sm);color:var(--color-text-muted)">Uploading…</div>
    </div>
  `);
  lucide.createIcons();
}

function dzOver(e) { e.preventDefault(); document.getElementById('dropzone').classList.add('drag-over'); }
function dzLeave(e) { document.getElementById('dropzone').classList.remove('drag-over'); }
function dzDrop(e, type) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files, type);
}

async function uploadFiles(fileList, type) {
  const prog = document.getElementById('upload-progress');
  prog.style.display = 'block';
  let ok = 0;
  for (const file of Array.from(fileList)) {
    prog.textContent = `Uploading ${file.name}…`;
    const fd = new FormData();
    fd.append('file', file);
    try {
      if (type==='smb') {
        const r = await apiFetch(`/api/smb/upload/${_activeDrive.id}?path=${encodeURIComponent(_path)}`,
          {method:'POST', body:fd});
        if (!r.ok) throw new Error('Upload failed');
      } else {
        const r = await apiFetch(`/api/gdrive/upload?folder=${_folderId}`,
          {method:'POST', body:fd});
        if (!r.ok) throw new Error('Upload failed');
      }
      ok++;
    } catch(e) { toast(`Failed: ${file.name} – ${e.message}`, 'error'); }
  }
  closeModal();
  if (ok) toast(`Uploaded ${ok} file${ok>1?'s':''}`, 'success');
  if (type==='smb') loadSMBFiles(); else loadGDriveFiles();
}

function showMkdirModal(type) {
  showModal(`
    <div class="modal-header">
      <span class="modal-title">New Folder</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg data-lucide="x" width="16" height="16"></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Folder name</label>
        <input class="form-input" id="mkdir-name" type="text" placeholder="New Folder" autofocus />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doMkdir('${type}')">Create</button>
    </div>
  `);
  lucide.createIcons();
  setTimeout(()=>document.getElementById('mkdir-name')?.focus(),50);
}

async function doMkdir(type) {
  const name = document.getElementById('mkdir-name').value.trim();
  if (!name) return;
  try {
    if (type==='smb') {
      const path = _path.replace(/\/$/,'') + '/' + name;
      await apiJSON(`/api/smb/mkdir/${_activeDrive.id}`, {method:'POST', json:{path}});
      loadSMBFiles();
    } else {
      await apiJSON('/api/gdrive/mkdir', {method:'POST', json:{parent:_folderId, name}});
      loadGDriveFiles();
    }
    closeModal();
    toast('Folder created', 'success');
  } catch(e) { toast('Failed: '+e.message, 'error'); }
}

          <button class="btn btn-primary btn-sm" onclick="connectGDrive()">

          </button>` : ``}
          ${_gdStatus.authenticated ? `
          <button class="btn btn-danger btn-sm" onclick="disconnectGDrive()">

        </div>

async function refreshShares() {
  try { _shares = await apiJSON('/api/smb/shares'); } catch(_) { _shares=[]; }
}

async function refreshGDStatus() {
  try { _gdStatus = await apiJSON('/api/gdrive/status'); } catch(_) {}
  try { _gdConfig = await apiJSON('/api/gdrive/config'); } catch(_) {}
}

function showAddShareModal() {
  showModal(`
    <div class="modal-header">
      <span class="modal-title">Add SMB Share</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg data-lucide="x" width="16" height="16"></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Display Name</label>
        <input class="form-input" id="s-name" placeholder="My NAS" /></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Host / IP</label>
          <input class="form-input" id="s-host" placeholder="192.168.1.10" /></div>
        <div class="form-group"><label class="form-label">Share Name</label>
          <input class="form-input" id="s-share" placeholder="media" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Username</label>
          <input class="form-input" id="s-user" placeholder="smb user" /></div>
        <div class="form-group"><label class="form-label">Password</label>
          <input class="form-input" id="s-pass" type="password" /></div>
      </div>
      <div class="form-group"><label class="form-label">Port (optional)</label>
        <input class="form-input" id="s-port" value="445" type="number" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddShare()">Add Share</button>
    </div>
  `);
  lucide.createIcons();
}

async function doAddShare() {
  const body = {
    name: document.getElementById('s-name').value.trim(),
    host: document.getElementById('s-host').value.trim(),
    share: document.getElementById('s-share').value.trim(),
    username: document.getElementById('s-user').value.trim(),
    password: document.getElementById('s-pass').value,
    port: parseInt(document.getElementById('s-port').value)||445,
  };
  if (!body.name||!body.host||!body.share) {
    toast('Name, host and share are required', 'error'); return;
  }
  try {
    await apiJSON('/api/smb/shares', {method:'POST', json:body});
    closeModal();
    toast('Share added', 'success');
    await refreshShares();
    renderSidebar();
    renderSettings();
  } catch(e) { toast('Failed: '+e.message, 'error'); }
}

async function deleteShare(id) {
  if (!confirm('Remove this share?')) return;
  try {
    await apiJSON(`/api/smb/shares/${id}`, {method:'DELETE'});
    toast('Share removed', 'success');
    if (_activeDrive?.id===id) { _activeDrive=null; setView('welcome'); }
    await refreshShares();
    renderSidebar();
    renderSettings();
  } catch(e) { toast('Failed: '+e.message, 'error'); }
}

async function saveGDConfig() {
  try {
    const body = {
      client_id: document.getElementById('gdcid').value.trim(),
      client_secret: document.getElementById('gdsecret').value.trim(),
      redirect_uri: document.getElementById('gdredir').value.trim(),
    };
    await apiJSON('/api/gdrive/config', {method:'POST', json:body});
    toast('Google Drive config saved');
    await refreshGDStatus();
    renderSettings();
  } catch(e) { toast('Save failed: ' + e.message, 'error'); }
}

async function saveSmbProxyCreds() {
  const user = document.getElementById('smb-proxy-user').value.trim();
  const pass = document.getElementById('smb-proxy-pass').value;
  const msg  = document.getElementById('smb-proxy-msg');
  if (!pass) { msg.style.color='var(--color-error)'; msg.textContent='Password is required'; return; }
  try {
    const r = await apiJSON('/api/smb/proxy-credentials', {method:'POST', json:{username:user, password:pass}});
    msg.style.color = 'var(--color-success)';
    msg.textContent = r.message || 'Saved!';
    document.getElementById('smb-proxy-pass').value = '';
    setTimeout(() => renderSettings(), 1500);
  } catch(e) {
    msg.style.color = 'var(--color-error)';
    msg.textContent = 'Failed: ' + e.message;
  }
}

async function connectGDrive() {
  try {
    const data = await apiJSON('/api/gdrive/auth');
    window.open(data.url, '_blank');
    toast('Complete auth in the new tab, then refresh Settings', 'success');
  } catch(e) { toast('Failed: '+e.message, 'error'); }
}

async function disconnectGDrive() {
  if (!confirm('Disconnect Google Drive?')) return;
  try {
    await apiJSON('/api/gdrive/revoke', {method:'DELETE'});
    toast('Google Drive disconnected', 'success');
    if (_activeDrive?.type==='gdrive') { _activeDrive=null; setView('welcome'); }
    await refreshGDStatus();
    renderSidebar();
    renderSettings();
  } catch(e) { toast('Failed: '+e.message, 'error'); }
}

function showLoading() {
  document.getElementById('content-area').innerHTML =
    `<div class="loading-state"><div class="spinner"></div></div>`;
}
function showError(msg) {
  document.getElementById('content-area').innerHTML =
    `<div class="empty-state"><svg data-lucide="alert-triangle" width="48" height="48"></svg>
     <h3>Error</h3><p>${escHtml(msg)}</p></div>`;
  lucide.createIcons();
}

function setBreadcrumb(crumbs) {
  BREADCRUMBS = crumbs;
  const el = document.getElementById('breadcrumb');
  el.innerHTML = crumbs.map((c,i) => {
    const isLast = i===crumbs.length-1;
    const sep = i>0 ? `<span class="bc-sep">/</span>` : '';
    const fn = isLast ? '' : `onclick="bcGo(${i})"`;
    return `${sep}<span class="bc-seg ${isLast?'current':''}" ${fn}>${escHtml(c.name)}</span>`;
  }).join('');
}

function bcGo(i) {
  const c = BREADCRUMBS[i];
  if (!c) return;
  if (_activeDrive?.type === 'smb') {
    _path = c.target;
    loadSMBFiles();
  } else if (_activeDrive?.type === 'gdrive') {
    _pathStack = _pathStack.slice(0, c.index + 1);
    _folderId = c.id || (c.name==='Google Drive'?'root':_pathStack[_pathStack.length-1].id);
    loadGDriveFiles();
  }
}

function setTopbarActions(html) {
  document.getElementById('topbar-actions').innerHTML = html;
  lucide.createIcons();
}
function showModal(html) {
  document.getElementById('modal-root').innerHTML =
    `<div class="modal-backdrop" onclick="e=>{if(e.target===this)closeModal()}" id="modal-backdrop">
       <div class="modal">${html}</div></div>`;
  document.getElementById('modal-backdrop').onclick = e => { if(e.target.id==='modal-backdrop') closeModal(); };
  lucide.createIcons();
}
function closeModal() { document.getElementById('modal-root').innerHTML=''; }
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type==='success' ? 'check-circle' : 'alert-circle';
  el.innerHTML = `<svg data-lucide="${icon}" class="toast-icon"></svg><span>${escHtml(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  lucide.createIcons();
  setTimeout(() => el.remove(), 4000);
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }
function toggleTheme() {
  const html = document.documentElement;
  const t = html.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', t);
}

function checkMobile() {
  const btn = document.getElementById('mobile-menu-btn');
  if (btn) btn.style.display = window.innerWidth < 769 ? 'flex' : 'none';
}
window.addEventListener('resize', checkMobile);

if (location.hash === '#gdrive-connected') {
  history.replaceState(null,'',location.pathname);
}

(async () => {
  if (_token) {
    try { await initApp(); }
    catch(_) {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  }
  checkMobile();
})();
</script>
</body>
</html>
